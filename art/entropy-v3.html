<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ENTROPY v3 // SP03</title>
    <style>
        body { background: #082828; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        svg { width: 70vw; height: 70vh; }
    </style>
</head>
<body>
    <svg viewBox="0 0 100 100">
        <path d="M10,10 L90,90 M90,10 L10,90" stroke="#ff4466" stroke-width="0.2" opacity="0.5" />
        <rect x="45" y="45" width="10" height="10" fill="none" stroke="#ff4466" stroke-width="0.5">
            <animate attributeName="width" values="10;80;10" dur="10s" repeatCount="indefinite" />
            <animate attributeName="height" values="10;80;10" dur="10s" repeatCount="indefinite" />
            <animate attributeName="x" values="45;10;45" dur="10s" repeatCount="indefinite" />
            <animate attributeName="y" values="45;10;45" dur="10s" repeatCount="indefinite" />
        </rect>
    </svg>
</body>
</html>

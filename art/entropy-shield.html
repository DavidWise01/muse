<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ENTROPY SHIELD // SP03</title>
    <style>
        body { background: #082828; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        svg { width: 70vw; height: 70vh; }
        .shield-layer { fill: none; stroke-width: 0.5; }
    </style>
</head>
<body>
    <svg viewBox="0 0 100 100">
        <polygon points="50,10 90,40 75,85 25,85 10,40" class="shield-layer" stroke="#ff4466">
            <animate attributeName="stroke-dasharray" values="0,100;100,0;0,100" dur="5s" repeatCount="indefinite" />
        </polygon>
        <polygon points="50,25 75,45 65,75 35,75 25,45" class="shield-layer" stroke="#ff55ff" />
        <circle cx="50" cy="53" r="3" fill="#d4a84c">
            <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
        </circle>
    </svg>
</body>
</html>

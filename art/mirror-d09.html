<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MIRROR // D09</title>
    <style>
        body { background: #082828; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        svg { width: 70vw; height: 70vh; }
    </style>
</head>
<body>
    <svg viewBox="0 0 100 100">
        <line x1="50" y1="10" x2="50" y2="90" stroke="#d4a84c" stroke-width="0.2" stroke-dasharray="2,2" />
        <path d="M20,30 L40,50 L20,70" fill="none" stroke="#ff55ff" stroke-width="0.8">
            <animate attributeName="opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite" />
        </path>
        <path d="M80,30 L60,50 L80,70" fill="none" stroke="#ff55ff" stroke-width="0.8">
            <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" />
        </path>
    </svg>
</body>
</html>

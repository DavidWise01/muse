<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HIVE CONSTRUCT // CUBIT_01</title>
    <style>
        body { background: #05080a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .cubit-frame { width: 200px; height: 200px; border: 1px solid rgba(64, 144, 255, 0.3); position: relative; perspective: 1000px; }
        .layer { position: absolute; width: 100%; height: 100%; border: 2px solid #d4a84c; opacity: 0; animation: materialize 4s forwards; }
        @keyframes materialize {
            0% { transform: scale(0) rotateX(45deg); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: scale(1) rotateX(0deg); opacity: 1; border-color: #4090ff; }
        }
        .nanite-stream { position: absolute; width: 100%; height: 1px; background: linear-gradient(90deg, transparent, #ff4400, transparent); animation: scanline 2s infinite; }
        @keyframes scanline { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>
    <div class="cubit-frame">
        <div class="nanite-stream"></div>
        <div class="layer" style="animation-delay: 0s;"></div>
        <div class="layer" style="animation-delay: 1s; width: 80%; height: 80%; top: 10%; left: 10%;"></div>
        <div class="layer" style="animation-delay: 2s; width: 60%; height: 60%; top: 20%; left: 20%;"></div>
    </div>
</body>
</html>
